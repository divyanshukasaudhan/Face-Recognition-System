{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h4 class="mb-3">{{ title }}</h4>
  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Roll No</label>
        {{ form.roll_no }}
      </div>
      <div class="col-md-8">
        <label class="form-label">Name</label>
        {{ form.name }}
      </div>
      <div class="col-md-6">
        <label class="form-label">Department</label>
        {{ form.department }}
      </div>
      <div class="col-md-6">
        <label class="form-label">Year</label>
        {{ form.year }}
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        {{ form.email }}
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        {{ form.phone }}
      </div>
      <div class="col-md-12">
        <div class="form-check">
          {{ form.is_active }} <label class="form-check-label">Active</label>
        </div>
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary">Save</button>
      <a class="btn btn-outline-secondary" href="/students/">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
